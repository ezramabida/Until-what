<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Week</title>

<style>

/* ================= FONTS ================= */
@font-face {
    font-family: 'CenturyGothic';
    src: url('centurygothic.ttf') format('truetype');
}

@font-face {
    font-family: 'ThisAppeal';
    src: url('ThisAppeal-FreeDemo.ttf') format('truetype');
}

@font-face {
    font-family: 'DiarioDeAndy';
    src: url('DiarioDeAndy-L3ADy.otf') format('opentype');
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: black;
    overflow: hidden;
    height: 100vh;
}

/* ================= INTRO ================= */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    font-family: 'CenturyGothic';
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.5s ease;
}

#introText {
    font-size: 28px;
}

#clickText {
    position: absolute;
    bottom: 40px;
    font-size: 14px;
    font-style: italic;
    opacity: 0.7;
}

/* ================= MENU ================= */
#menuScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
}

#menuBg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-family: 'ThisAppeal';
    font-size: 90px;
    color: black;
}

#menu {
    position: absolute;
    bottom: 80px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.option {
    font-family: 'CenturyGothic';
    font-size: 28px;
    color: black;
    cursor: pointer;
}

/* ================= FADE ================= */
#fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 999;
}

/* ================= SETTINGS (CLEAN UI) ================= */
#settingsPanel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 20px 25px;
    width: 320px;
    border-radius: 10px;
    font-family: 'CenturyGothic';
    color: white;
    display: none;
    z-index: 1000;
}

#settingsPanel h3 {
    margin: 0 0 15px 0;
    font-size: 20px;
    letter-spacing: 1px;
}

.setting-row {
    margin-bottom: 15px;
}

.setting-row label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
    opacity: 0.9;
}

.setting-row input {
    width: 100%;
}

#closeSettings {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    background: white;
    border: none;
    cursor: pointer;
    font-family: 'CenturyGothic';
}

/* ================= GAME ================= */
#gameScreen {
    display: none;
}

#game {
    width: 960px;
    height: 540px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DiarioDeAndy', Arial;
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* DIALOGUE */
#dialogue-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 130px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
}

#name-box {
    position: absolute;
    top: -25px;
    left: 15px;
    font-weight: bold;
    padding: 5px 10px;
}

#text {
    color: white;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- FADE -->
<div id="fade"></div>

<!-- ================= INTRO ================= -->
<div id="introScreen" onclick="enterMenu()">
    <div id="introText">Only a fictional story</div>
    <div id="clickText">(click anywhere)</div>
</div>

<!-- ================= MENU ================= -->
<div id="menuScreen">
    <img id="menuBg" src="menu.gif">

    <div id="title">LAST WEEK</div>

    <div id="menu">
        <div class="option" onclick="startGame()">PLAY</div>
        <div class="option" onclick="openSettings()">SETTINGS</div>
    </div>
</div>

<!-- ================= SETTINGS ================= -->
<div id="settingsPanel">
    <h3>SETTINGS</h3>

    <div class="setting-row">
        <label>Music</label>
        <input id="music" type="range" min="0" max="1" step="0.01">
    </div>

    <div class="setting-row">
        <label>Ambience</label>
        <input id="ambience" type="range" min="0" max="1" step="0.01">
    </div>

    <div class="setting-row">
        <label>SFX</label>
        <input id="sfx" type="range" min="0" max="1" step="0.01">
    </div>

    <button id="closeSettings">Close</button>
</div>

<!-- ================= AUDIO ================= -->
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="sceneMusic" src="scene1.mp3" loop></audio>

<script>

/* ================= INTRO FADE ================= */
const intro = document.getElementById("introScreen");

window.onload = () => {
    intro.style.opacity = 1; // fade in
};

function enterMenu() {

    intro.style.opacity = 0; // fade out

    setTimeout(() => {
        intro.style.display = "none";
        document.getElementById("menuScreen").style.display = "block";

        menuMusic.volume = 0.6;
        menuMusic.play().catch(() => {});
    }, 1500);
}

/* ================= AUDIO ================= */
const menuMusic = document.getElementById("menuMusic");
const sceneMusic = document.getElementById("sceneMusic");

let audioSettings = {
    music: 0.6,
    ambience: 0.4,
    sfx: 0.7
};

/* ================= SETTINGS ================= */
function openSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = "block";

    document.getElementById("music").value = audioSettings.music;
    document.getElementById("ambience").value = audioSettings.ambience;
    document.getElementById("sfx").value = audioSettings.sfx;
}

/* LIVE SETTINGS */
document.getElementById("music").oninput = (e) => {
    audioSettings.music = e.target.value;
    menuMusic.volume = audioSettings.music;
    sceneMusic.volume = audioSettings.music;
};

document.getElementById("ambience").oninput = (e) => {
    audioSettings.ambience = e.target.value;
};

document.getElementById("sfx").oninput = (e) => {
    audioSettings.sfx = e.target.value;
};

document.getElementById("closeSettings").onclick = () => {
    document.getElementById("settingsPanel").style.display = "none";
};

/* ================= START GAME ================= */
function startGame() {

    const fade = document.getElementById("fade");
    fade.style.opacity = 1;

    menuMusic.pause();
    menuMusic.currentTime = 0;

    setTimeout(() => {

        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        sceneMusic.volume = audioSettings.music;
        sceneMusic.play();

        fade.style.opacity = 0;

    }, 2000);
}

</script>

</body>
</html>
