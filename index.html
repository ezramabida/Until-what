<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Week</title>

<style>

/* ================= FONTS ================= */
@font-face {
    font-family: 'CenturyGothic';
    src: url('centurygothic.ttf') format('truetype');
}

@font-face {
    font-family: 'ThisAppeal';
    src: url('ThisAppeal-FreeDemo.ttf') format('truetype');
}

@font-face {
    font-family: 'DiarioDeAndy';
    src: url('DiarioDeAndy-L3ADy.otf') format('opentype');
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: black;
    overflow: hidden;
    height: 100vh;
}

/* ================= INTRO ================= */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    font-family: 'CenturyGothic';
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

#introText {
    font-size: 28px;
}

#clickText {
    position: absolute;
    bottom: 40px;
    font-size: 14px;
    font-style: italic;
    opacity: 0.7;
}

/* ================= MENU ================= */
#menuScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
}

#menuBg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-family: 'ThisAppeal';
    font-size: 90px;
    color: black;
}

#menu {
    position: absolute;
    bottom: 80px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.option {
    font-family: 'CenturyGothic';
    font-size: 28px;
    color: black;
    cursor: pointer;
}

/* ================= FADE ================= */
#fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 999;
}

/* ================= GAME ================= */
#gameScreen {
    display: none;
}

#game {
    width: 960px;
    height: 540px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DiarioDeAndy', Arial;
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* CHARACTERS */
.character {
    position: absolute;
    bottom: 40px;
    width: 320px;
    height: 320px;
}

.left { left: 30px; }
.right { right: 30px; }

/* DIALOGUE */
#dialogue-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 130px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
}

#name-box {
    position: absolute;
    top: -25px;
    left: 15px;
    font-weight: bold;
    padding: 5px 10px;
}

#text {
    color: white;
    margin-top: 10px;
}

/* CHOICES */
#choices {
    position: absolute;
    bottom: 160px;
    width: 100%;
    display: none;
    text-align: center;
}

.choice {
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px;
    margin: 8px auto;
    width: 40%;
    cursor: pointer;
    border-radius: 6px;
}

</style>
</head>

<body>

<!-- FADE -->
<div id="fade"></div>

<!-- ================= INTRO ================= -->
<div id="introScreen" onclick="enterMenu()">
    <div id="introText">Only a fictional story</div>
    <div id="clickText">(click anywhere)</div>
</div>

<!-- ================= MENU ================= -->
<div id="menuScreen">
    <img id="menuBg" src="menu.gif">

    <div id="title">LAST WEEK</div>

    <div id="menu">
        <div class="option" onclick="startGame()">PLAY</div>
        <div class="option" onclick="openSettings()">SETTINGS</div>
    </div>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen">
    <div id="game">

        <img id="background" src="scene 1 bg.gif">

        <img class="character left" src="char_vin.png">
        <img class="character right" src="char_nina_placeholder.png">

        <div id="choices"></div>

        <div id="dialogue-box">
            <div id="name-box"></div>
            <div id="text"></div>
        </div>

    </div>
</div>

<!-- ================= AUDIO ================= -->
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="sceneMusic" src="scene1.mp3" loop></audio>

<script>

/* ================= AUDIO ================= */
const menuMusic = document.getElementById("menuMusic");
const sceneMusic = document.getElementById("sceneMusic");

let audioSettings = {
    music: 0.6,
    ambience: 0.4,
    sfx: 0.7
};

/* ================= INTRO → MENU ================= */
function enterMenu() {
    document.getElementById("introScreen").style.display = "none";
    document.getElementById("menuScreen").style.display = "block";

    menuMusic.volume = audioSettings.music;
    menuMusic.play().catch(() => {});
}

/* ================= START GAME ================= */
function startGame() {

    const fade = document.getElementById("fade");
    fade.style.opacity = 1;

    menuMusic.pause();
    menuMusic.currentTime = 0;

    setTimeout(() => {

        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        sceneMusic.volume = audioSettings.music;
        sceneMusic.play();

        fade.style.opacity = 0;

    }, 2000);
}

/* ================= SETTINGS ================= */
function openSettings() {
    alert("Settings system can be upgraded into full slider UI later.");
}

/* ================= VN SYSTEM ================= */

const characters = {
    "Vin": { color: "#4da6ff" },
    "Niña": { color: "#ffb6c1" }
};

const gameData = {
    scene1: {
        background: "scene 1 bg.gif",
        dialogues: [
            {
                character: "Niña",
                text: "Pogi lagi kaayo si Ezra noh?",
                choices: [
                    {
                        text: "Sobra ka pogi.",
                        reply: {
                            character: "Vin",
                            text: "Of course. No debate."
                        }
                    },
                    {
                        text: "Ganii.",
                        reply: {
                            character: "Vin",
                            text: "True. That’s just facts."
                        }
                    }
                ]
            }
        ]
    }
};

let currentScene = "scene1";
let dialogueIndex = 0;
let state = "dialogue";
let pendingChoices = null;
let pendingReply = null;

const bg = document.getElementById("background");
const textBox = document.getElementById("text");
const nameBox = document.getElementById("name-box");
const choicesDiv = document.getElementById("choices");

/* LOAD SCENE */
function loadScene(sceneName) {
    currentScene = sceneName;
    dialogueIndex = 0;
    bg.src = gameData[sceneName].background;
    nextDialogue();
}

/* TYPE TEXT */
function typeText(text, i = 0) {
    if (i < text.length) {
        textBox.innerHTML += text.charAt(i);
        setTimeout(() => typeText(text, i + 1), 20);
    }
}

/* SHOW DIALOGUE */
function showDialogue(d) {
    textBox.innerHTML = "";
    nameBox.innerText = d.character;
    nameBox.style.color = characters[d.character]?.color || "white";
    typeText(d.text);
}

/* FLOW */
function nextDialogue() {

    if (state === "reply" && pendingReply) {
        state = "dialogue";
        showDialogue(pendingReply);
        pendingReply = null;
        return;
    }

    const scene = gameData[currentScene];
    const dialogue = scene.dialogues[dialogueIndex];

    if (!dialogue) return;

    showDialogue(dialogue);

    if (dialogue.choices) {
        pendingChoices = dialogue.choices;
        state = "choices";
    }
}

/* CHOICES */
function showChoices(choices) {
    choicesDiv.innerHTML = "";
    choicesDiv.style.display = "block";

    choices.forEach(c => {
        const btn = document.createElement("div");
        btn.className = "choice";
        btn.innerText = c.text;

        btn.onclick = (e) => {
            e.stopPropagation();

            choicesDiv.style.display = "none";

            showDialogue({
                character: "Vin",
                text: c.text
            });

            pendingReply = c.reply;
            state = "reply";
        };

        choicesDiv.appendChild(btn);
    });
}

/* CLICK ANYWHERE */
document.addEventListener("click", () => {
    if (state === "choices" && pendingChoices) {
        showChoices(pendingChoices);
        pendingChoices = null;
        return;
    }

    nextDialogue();
});

</script>

</body>
</html>
