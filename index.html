<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Week</title>

<style>

/* ================= FONTS ================= */
@font-face {
    font-family: 'CenturyGothic';
    src: url('centurygothic.ttf') format('truetype');
}

@font-face {
    font-family: 'ThisAppeal';
    src: url('ThisAppeal-FreeDemo.ttf') format('truetype');
}

@font-face {
    font-family: 'DiarioDeAndy';
    src: url('DiarioDeAndy-L3ADy.otf') format('opentype');
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* ================= INTRO ================= */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    font-family: 'CenturyGothic';
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.2s ease;
}

#clickText {
    position: absolute;
    bottom: 40px;
    font-size: 14px;
    font-style: italic;
    opacity: 0.7;
}

/* ================= MENU ================= */
#menuScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
}

#menuBg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-family: 'ThisAppeal';
    font-size: 90px;
    color: black;
}

.option {
    font-family: 'CenturyGothic';
    font-size: 28px;
    cursor: pointer;
}

/* ================= FADE ================= */
#fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: 1s;
    z-index: 999;
}

/* ================= GAME ================= */
#gameScreen {
    display: none;
}

#game {
    width: 960px;
    height: 540px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DiarioDeAndy';
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* ================= DIALOGUE ================= */
#dialogue-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 130px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    color: white;
}

#name-box {
    position: absolute;
    top: -25px;
    left: 15px;
    font-weight: bold;
    padding: 5px 10px;
}

#text {
    margin-top: 10px;
    color: white;
}

/* ================= CHOICES ================= */
#choices {
    position: absolute;
    bottom: 170px;
    width: 100%;
    display: none;
    text-align: center;
}

.choice {
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px;
    margin: 8px auto;
    width: 40%;
    cursor: pointer;
}

</style>
</head>

<body>

<div id="fade"></div>

<!-- INTRO -->
<div id="introScreen" onclick="enterMenu()">
    <div>Only a fictional story</div>
    <div id="clickText">(click anywhere)</div>
</div>

<!-- MENU -->
<div id="menuScreen">
    <img id="menuBg" src="menu.gif">

    <div id="title">LAST WEEK</div>

    <div style="position:absolute;bottom:80px;left:40px;">
        <div class="option" onclick="startGame()">PLAY</div>
        <div class="option" onclick="openSettings()">SETTINGS</div>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">
    <div id="game">

        <img id="background" src="scene 1 bg.gif">

        <div id="choices"></div>

        <div id="dialogue-box">
            <div id="name-box"></div>
            <div id="text"></div>
        </div>

    </div>
</div>

<!-- AUDIO -->
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="sceneMusic" src="scene1.mp3" loop></audio>

<script>

/* ================= AUDIO ================= */
const menuMusic = document.getElementById("menuMusic");
const sceneMusic = document.getElementById("sceneMusic");

let audioSettings = { music: 0.6 };

/* ================= INTRO ================= */
window.onload = () => {
    document.getElementById("introScreen").style.opacity = 1;
};

function enterMenu() {
    const intro = document.getElementById("introScreen");
    intro.style.opacity = 0;

    setTimeout(() => {
        intro.style.display = "none";
        document.getElementById("menuScreen").style.display = "block";

        menuMusic.volume = audioSettings.music;
        menuMusic.play().catch(()=>{});
    }, 1200);
}

/* ================= VN DATA ================= */
const characters = {
    "Vin": "#4da6ff",
    "Niña": "#ffb6c1"
};

const gameData = {
    scene1: {
        background: "scene 1 bg.gif",
        dialogues: [
            {
                character: "Niña",
                text: "Pogi lagi kaayo si Ezra noh?",
                choices: [
                    {
                        text: "Sobra ka pogi.",
                        reply: {
                            character: "Vin",
                            text: "Of course. No debate."
                        }
                    },
                    {
                        text: "Ganii.",
                        reply: {
                            character: "Vin",
                            text: "True. That’s just facts."
                        }
                    }
                ]
            }
        ]
    }
};

/* ================= STATE ================= */
let currentScene = "scene1";
let index = 0;
let state = "dialogue";
let pendingChoices = null;
let pendingReply = null;

/* ================= ELEMENTS ================= */
const bg = document.getElementById("background");
const textBox = document.getElementById("text");
const nameBox = document.getElementById("name-box");
const choicesDiv = document.getElementById("choices");

/* ================= LOAD SCENE ================= */
function loadScene(name) {
    currentScene = name;
    index = 0;
    bg.src = gameData[name].background;
    next();
}

/* ================= TEXT ================= */
function type(text, i=0){
    if(i < text.length){
        textBox.innerHTML += text[i];
        setTimeout(()=>type(text,i+1),20);
    }
}

/* ================= SHOW ================= */
function show(d){
    textBox.innerHTML = "";
    nameBox.innerText = d.character;
    nameBox.style.color = characters[d.character] || "white";
    type(d.text);
}

/* ================= NEXT ================= */
function next(){

    if(state === "reply" && pendingReply){
        state = "dialogue";
        show(pendingReply);
        pendingReply = null;
        return;
    }

    const d = gameData[currentScene].dialogues[index];
    if(!d) return;

    show(d);

    if(d.choices){
        pendingChoices = d.choices;
        state = "choices";
    }
}

/* ================= CHOICES ================= */
function showChoices(list){
    choicesDiv.innerHTML = "";
    choicesDiv.style.display = "block";

    list.forEach(c=>{
        const b = document.createElement("div");
        b.className = "choice";
        b.innerText = c.text;

        b.onclick = (e)=>{
            e.stopPropagation();

            choicesDiv.style.display = "none";

            show({character:"Vin", text:c.text});

            pendingReply = c.reply;
            state = "reply";
        };

        choicesDiv.appendChild(b);
    });
}

/* ================= CLICK ANYWHERE ================= */
document.addEventListener("click", ()=>{

    if(state === "choices" && pendingChoices){
        showChoices(pendingChoices);
        pendingChoices = null;
        return;
    }

    next();
});

/* ================= START GAME ================= */
function startGame(){

    const fade = document.getElementById("fade");
    fade.style.opacity = 1;

    menuMusic.pause();
    menuMusic.currentTime = 0;

    setTimeout(()=>{

        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        loadScene("scene1"); // ✅ FIXED CORE ISSUE

        sceneMusic.volume = audioSettings.music;
        sceneMusic.play();

        fade.style.opacity = 0;

    },2000);
}

</script>

</body>
</html>
