<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Week</title>

<style>

/* (same styles as your last working version — shortened here for clarity) */

body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* FADE */
#fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 999;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* MENU */
#menuBg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-size: 90px;
    font-family: sans-serif;
    color: black;
}

#menu {
    position: absolute;
    bottom: 80px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.option {
    font-size: 28px;
    cursor: pointer;
}

/* GAME */
#gameScreen { display: none; }

#game {
    width: 960px;
    height: 540px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
}

.character {
    position: absolute;
    bottom: 40px;
    width: 320px;
    height: 320px;
}

.left { left: 30px; }
.right { right: 30px; }

#dialogue-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 130px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
}

#name-box {
    position: absolute;
    top: -25px;
    left: 15px;
    font-weight: bold;
}

#text {
    color: white;
    margin-top: 10px;
}

#choices {
    position: absolute;
    bottom: 160px;
    width: 100%;
    display: none;
    text-align: center;
}

.choice {
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px;
    margin: 8px auto;
    width: 40%;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- FADE -->
<div id="fade"></div>

<!-- ================= MENU ================= -->
<div id="menuScreen" class="screen">
    <img id="menuBg" src="menu.gif">

    <div id="title">LAST WEEK</div>

    <div id="menu">
        <div class="option" onclick="startGame()">PLAY</div>
        <div class="option" onclick="openSettings()">SETTINGS</div>
    </div>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen" class="screen">

    <div id="game">

        <img id="background" src="scene 1 bg.gif">

        <img id="char-left" class="character left" src="char_vin.png">
        <img id="char-right" class="character right" src="char_nina_placeholder.png">

        <div id="choices"></div>

        <div id="dialogue-box">
            <div id="name-box"></div>
            <div id="text"></div>
        </div>

    </div>
</div>

<!-- ================= MUSIC ================= -->
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="sceneMusic" src="scene1.mp3" loop></audio>

<script>

/* ================= MUSIC CONTROL ================= */
const menuMusic = document.getElementById("menuMusic");
const sceneMusic = document.getElementById("sceneMusic");

function playMenuMusic() {
    sceneMusic.pause();
    sceneMusic.currentTime = 0;

    menuMusic.volume = 0.6;
    menuMusic.play();
}

function playSceneMusic() {
    menuMusic.pause();
    menuMusic.currentTime = 0;

    sceneMusic.volume = 0.6;
    sceneMusic.play();
}

/* ================= START MENU MUSIC ================= */
window.onload = () => {
    playMenuMusic();
};

/* ================= FADE TRANSITION ================= */
function fadeToGame() {
    const fade = document.getElementById("fade");
    fade.style.opacity = 1;

    setTimeout(() => {
        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        playSceneMusic(); // 🎵 switch music here
        loadScene("scene1");

        fade.style.opacity = 0;
    }, 2000);
}

/* ================= MENU ================= */
function startGame() {
    fadeToGame();
}

function openSettings() {
    alert("Settings coming soon.");
}

/* ================= VN SYSTEM ================= */

const characters = {
    "Vin": { color: "#4da6ff" },
    "Niña": { color: "#ffb6c1" }
};

const gameData = {
    scene1: {
        background: "scene 1 bg.gif",
        dialogues: [
            {
                character: "Niña",
                text: "Pogi lagi kaayo si Ezra noh?",
                choices: [
                    {
                        text: "Sobra ka pogi.",
                        reply: {
                            character: "Vin",
                            text: "Of course. No debate."
                        }
                    },
                    {
                        text: "Ganii.",
                        reply: {
                            character: "Vin",
                            text: "True. That’s just facts."
                        }
                    }
                ]
            }
        ]
    }
};

let currentScene = "scene1";
let dialogueIndex = 0;
let state = "dialogue";
let pendingChoices = null;
let pendingReply = null;

const bg = document.getElementById("background");
const textBox = document.getElementById("text");
const nameBox = document.getElementById("name-box");
const choicesDiv = document.getElementById("choices");

/* LOAD */
function loadScene(sceneName) {
    currentScene = sceneName;
    dialogueIndex = 0;
    bg.src = gameData[sceneName].background;
    nextDialogue();
}

/* TYPE */
function typeText(text, i = 0) {
    if (i < text.length) {
        textBox.innerHTML += text.charAt(i);
        setTimeout(() => typeText(text, i + 1), 20);
    }
}

/* SHOW */
function showDialogue(d) {
    textBox.innerHTML = "";
    nameBox.innerText = d.character;
    nameBox.style.color = characters[d.character]?.color || "white";
    typeText(d.text);
}

/* FLOW */
function nextDialogue() {

    if (state === "reply" && pendingReply) {
        state = "dialogue";
        showDialogue(pendingReply);
        pendingReply = null;
        return;
    }

    const scene = gameData[currentScene];
    const dialogue = scene.dialogues[dialogueIndex];

    if (!dialogue) return;

    showDialogue(dialogue);

    if (dialogue.choices) {
        pendingChoices = dialogue.choices;
        state = "choices";
    }
}

/* CHOICES */
function showChoices(choices) {
    choicesDiv.innerHTML = "";
    choicesDiv.style.display = "block";

    choices.forEach(c => {
        const btn = document.createElement("div");
        btn.className = "choice";
        btn.innerText = c.text;

        btn.onclick = (e) => {
            e.stopPropagation();

            choicesDiv.style.display = "none";

            showDialogue({
                character: "Vin",
                text: c.text
            });

            pendingReply = c.reply;
            state = "reply";
        };

        choicesDiv.appendChild(btn);
    });
}

/* CLICK */
document.addEventListener("click", () => {

    if (state === "choices" && pendingChoices) {
        showChoices(pendingChoices);
        pendingChoices = null;
        return;
    }

    nextDialogue();
});

</script>

</body>
</html>
