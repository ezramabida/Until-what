<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Week</title>

<style>

/* ================= FONTS ================= */
@font-face {
    font-family: 'CenturyGothic';
    src: url('centurygothic.ttf') format('truetype');
}

@font-face {
    font-family: 'ThisAppeal';
    src: url('ThisAppeal-FreeDemo.ttf') format('truetype');
}

@font-face {
    font-family: 'DiarioDeAndy';
    src: url('DiarioDeAndy-L3ADy.otf') format('opentype');
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: black;
    overflow: hidden;
    height: 100vh;
}

/* ================= INTRO ================= */
#introScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    font-family: 'CenturyGothic';
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1.5s ease;
}

#introText {
    font-size: 28px;
}

#clickText {
    position: absolute;
    bottom: 40px;
    font-size: 14px;
    font-style: italic;
    opacity: 0.7;
}

/* ================= MENU ================= */
#menuScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
}

#menuBg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-family: 'ThisAppeal';
    font-size: 90px;
    color: black;
}

#menu {
    position: absolute;
    bottom: 80px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.option {
    font-family: 'CenturyGothic';
    font-size: 28px;
    color: black;
    cursor: pointer;
}

/* ================= FADE ================= */
#fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 999;
}

/* ================= SETTINGS ================= */
#settingsPanel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.88);
    padding: 20px;
    width: 320px;
    border-radius: 10px;
    font-family: 'CenturyGothic';
    color: white;
    display: none;
    z-index: 1000;
}

#settingsPanel h3 {
    margin-bottom: 15px;
}

.setting {
    margin-bottom: 15px;
}

.setting label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

.setting input {
    width: 100%;
}

#closeSettings {
    width: 100%;
    padding: 8px;
    border: none;
    cursor: pointer;
    font-family: 'CenturyGothic';
}

/* ================= GAME ================= */
#gameScreen {
    display: none;
}

#game {
    width: 960px;
    height: 540px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DiarioDeAndy', Arial;
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* ================= DIALOGUE ================= */
#dialogue-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 130px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
}

#name-box {
    position: absolute;
    top: -25px;
    left: 15px;
    font-weight: bold;
    padding: 5px 10px;
}

#text {
    color: white;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- FADE -->
<div id="fade"></div>

<!-- ================= INTRO ================= -->
<div id="introScreen" onclick="enterMenu()">
    <div id="introText">Only a fictional story</div>
    <div id="clickText">(click anywhere)</div>
</div>

<!-- ================= MENU ================= -->
<div id="menuScreen">
    <img id="menuBg" src="menu.gif">

    <div id="title">LAST WEEK</div>

    <div id="menu">
        <div class="option" onclick="startGame()">PLAY</div>
        <div class="option" onclick="openSettings()">SETTINGS</div>
    </div>
</div>

<!-- ================= SETTINGS ================= -->
<div id="settingsPanel">
    <h3>SETTINGS</h3>

    <div class="setting">
        <label>Music</label>
        <input id="music" type="range" min="0" max="1" step="0.01">
    </div>

    <div class="setting">
        <label>Ambience</label>
        <input id="ambience" type="range" min="0" max="1" step="0.01">
    </div>

    <div class="setting">
        <label>SFX</label>
        <input id="sfx" type="range" min="0" max="1" step="0.01">
    </div>

    <button id="closeSettings">Close</button>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen">
    <div id="game">

        <img id="background" src="scene 1 bg.gif">

        <div id="dialogue-box">
            <div id="name-box"></div>
            <div id="text"></div>
        </div>

    </div>
</div>

<!-- ================= AUDIO ================= -->
<audio id="menuMusic" src="menu.mp3" loop></audio>
<audio id="sceneMusic" src="scene1.mp3" loop></audio>

<script>

/* ================= INTRO ================= */
const intro = document.getElementById("introScreen");

window.onload = () => {
    intro.style.opacity = 1;
};

function enterMenu() {
    intro.style.opacity = 0;

    setTimeout(() => {
        intro.style.display = "none";
        document.getElementById("menuScreen").style.display = "block";

        menuMusic.volume = audioSettings.music;
        menuMusic.play().catch(() => {});
    }, 1500);
}

/* ================= AUDIO ================= */
const menuMusic = document.getElementById("menuMusic");
const sceneMusic = document.getElementById("sceneMusic");

let audioSettings = {
    music: 0.6,
    ambience: 0.4,
    sfx: 0.7
};

/* ================= SETTINGS ================= */
function openSettings() {
    document.getElementById("settingsPanel").style.display = "block";

    document.getElementById("music").value = audioSettings.music;
    document.getElementById("ambience").value = audioSettings.ambience;
    document.getElementById("sfx").value = audioSettings.sfx;
}

document.getElementById("music").oninput = (e) => {
    audioSettings.music = e.target.value;
    menuMusic.volume = audioSettings.music;
    sceneMusic.volume = audioSettings.music;
};

document.getElementById("closeSettings").onclick = () => {
    document.getElementById("settingsPanel").style.display = "none";
};

/* ================= VN SYSTEM ================= */

const gameData = {
    scene1: {
        background: "scene 1 bg.gif",
        dialogues: [
            {
                character: "Niña",
                text: "Pogi lagi kaayo si Ezra noh?"
            }
        ]
    }
};

let currentScene = "scene1";
let dialogueIndex = 0;

const bg = document.getElementById("background");
const textBox = document.getElementById("text");
const nameBox = document.getElementById("name-box");

/* ================= LOAD SCENE ================= */
function loadScene(sceneName) {
    currentScene = sceneName;
    dialogueIndex = 0;

    bg.src = gameData[sceneName].background;
    nextDialogue();
}

/* ================= DIALOGUE ================= */
function typeText(text, i = 0) {
    if (i < text.length) {
        textBox.innerHTML += text.charAt(i);
        setTimeout(() => typeText(text, i + 1), 20);
    }
}

function nextDialogue() {
    const scene = gameData[currentScene];
    const dialogue = scene.dialogues[dialogueIndex];

    if (!dialogue) return;

    textBox.innerHTML = "";
    nameBox.innerText = dialogue.character;

    typeText(dialogue.text);
}

/* ================= START GAME (FIXED) ================= */
function startGame() {

    const fade = document.getElementById("fade");
    fade.style.opacity = 1;

    menuMusic.pause();
    menuMusic.currentTime = 0;

    setTimeout(() => {

        document.getElementById("menuScreen").style.display = "none";
        document.getElementById("gameScreen").style.display = "block";

        // ✅ THIS FIXES YOUR ISSUE
        loadScene("scene1");

        sceneMusic.volume = audioSettings.music;
        sceneMusic.play();

        fade.style.opacity = 0;

    }, 2000);
}

</script>

</body>
</html>
